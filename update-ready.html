<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <title>更新已就绪</title>
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
        font-size: 14px;
        color: #0f172a;
        background: #f8fafc;
        padding: 18px 20px 16px;
        user-select: none;
      }
      h1 {
        margin: 0 0 8px;
        font-size: 16px;
        font-weight: 600;
      }
      p {
        margin: 0 0 18px;
        line-height: 1.45;
        color: #475569;
        font-size: 13px;
      }
      .actions {
        display: flex;
        gap: 10px;
        justify-content: flex-end;
      }
      button {
        padding: 8px 16px;
        border-radius: 6px;
        font-size: 13px;
        cursor: pointer;
        border: 1px solid #cbd5e1;
        background: #fff;
        color: #334155;
      }
      button.primary {
        border-color: #0d9488;
        background: #14b8a6;
        color: #fff;
        font-weight: 500;
      }
      button:hover {
        filter: brightness(0.97);
      }
      button.primary:hover {
        filter: brightness(1.05);
      }
    </style>
  </head>
  <body>
    <h1>更新已就绪</h1>
    <p id="line">新版本已下载完成，是否立即重启并完成安装？</p>
    <div class="actions">
      <button type="button" id="later">稍后</button>
      <button type="button" class="primary" id="now">立即重启</button>
    </div>
    <script>
      (function () {
        try {
          var q = new URLSearchParams(window.location.search || '');
          var v = q.get('v');
          if (v) {
            document.getElementById('line').textContent =
              'Kloud Meet ' + decodeURIComponent(v) + ' 已下载完成，是否立即重启并完成安装？';
          }
        } catch (_) {}
        var api = window.updateReady;
        document.getElementById('now').onclick = function () {
          if (api && typeof api.installNow === 'function') api.installNow();
        };
        document.getElementById('later').onclick = function () {
          if (api && typeof api.installLater === 'function') api.installLater();
        };
      })();
    </script>
  </body>
</html>
